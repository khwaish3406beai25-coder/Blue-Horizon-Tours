<section class="section">
  <h2>🌍 Destination Gallery</h2>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?auto=format&fit=crop&w=800&q=60" alt="Beach">
    <img src="https://images.unsplash.com/photo-1526772662000-3f88f10405ff?auto=format&fit=crop&w=800&q=60" alt="Mountain">

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">✕</span>
  <img id="lightboxImg" src="" alt="Preview">
</div>

<footer>
  <div class="footer-bottom">
    <p>© 2026 Blue Horizon Tours | Gallery 🌍</p>
  </div>
</footer>

<button id="backToTop">↑</button>
<button id="darkModeBtn">🌙</button>

<script src="main.js"></script>
<script>

const lightbox  = document.getElementById("lightbox");
const lbImg     = document.getElementById("lightboxImg");
const lbClose   = document.getElementById("lightboxClose");

document.querySelectorAll(".gallery img").forEach(function(img) {
  img.addEventListener("click", function() {
    lbImg.src = img.src.replace("w=800", "w=1400");
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  });
});

lbClose.addEventListener("click", function() {
  closeLightbox();
});

lightbox.addEventListener("click", function(e) {
  if (e.target === lightbox) {
    closeLightbox();
  }
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeLightbox();
  }
});

function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}
</script>
</body>
</html>
